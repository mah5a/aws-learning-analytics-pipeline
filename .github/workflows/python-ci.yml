name: Python CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python scripts
        run: |
          python -m compileall glue_jobs

      - name: Install flake8
        run: |
          pip install flake8

      - name: Run flake8
        run: |
          flake8 glue_jobs --max-line-length=300 --ignore=E251,E302,E305,E501,F403,F405,W503
